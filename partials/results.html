      <!-- RESULTS -->
      <section class="section" id="results">
        <div class="container">
          <div class="section__head">
            <h2>Client snapshots</h2>
          </div>

          <div class="grid gallery" id="gallery">
            <!-- SVG placeholders: swap for real client photos later -->
            <button class="tile" data-full="./assets/before-after.png" aria-label="Open result 1">
              <img src="./assets/before-after.png" alt="Result placeholder 1" loading="lazy" />
            </button>
            <button class="tile" data-full="assets/result.png" aria-label="Open result 2">
              <img src="assets/result.png" alt="Result placeholder 2" loading="lazy" />
            </button>
            <button class="tile" data-full="assets/progress.png" aria-label="Open result 3">
              <img src="assets/progress.png" alt="Result placeholder 3" loading="lazy" />
            </button>
            <button class="tile" data-full="assets/consistency.png" aria-label="Open result 4">
              <img src="assets/consistency.png" alt="Result placeholder 4" loading="lazy" />
            </button>
            <button class="tile" data-full="assets/transformation.png" aria-label="Open result 5">
              <img src="assets/transformation.png" alt="Result placeholder 5" loading="lazy" />
            </button>
            <button class="tile" data-full="assets/data.png" aria-label="Open result 6">
              <img src="assets/data.png" alt="Result placeholder 6" loading="lazy" />
            </button>
          </div>

          <div class="quote">
            <p class="quote__text" id="quoteText">
              "Finally a plan I can stick to without my whole day revolving around it."
            </p>
            <p class="quote__meta" id="quoteMeta">— Client, 12-week block</p>
            <div class="quote__controls">
              <button class="btn btn--ghost btn--sm" id="quotePrev" type="button">Prev</button>
              <button class="btn btn--ghost btn--sm" id="quoteNext" type="button">Next</button>
            </div>
          </div>
        </div>
      </section>
